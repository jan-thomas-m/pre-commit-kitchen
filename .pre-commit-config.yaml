repos:
  # # mete repo/identity, for debug
  # - repo: meta
  #   hooks:
  #     - id: identity
  #       name: 'Meta/identity: Just list the file scoped for tests'

  - repo: local
    hooks:
      # this hook makes sure our pre-commit hooks are kept up
      # to date
      - id: update-pre-commit
        name: update-pre-commit
        # run roughly every 10 commits
        # For busy repos we should change this to 15 or 20
        entry: bash -c 'if (( RANDOM % 10 == 0 )); then bash -c "pre-commit autoupdate"; fi;'
        language: system

  - repo: https://github.com/pre-commit/sync-pre-commit-deps
    rev: v0.0.3
    hooks:
      - id: sync-pre-commit-deps

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
        alias: fix-eof
        name: Fix end of file
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude_types: [markdown]
      - id: mixed-line-ending
      # - id: double-quote-string-fixer
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      # Removes UTF-8 BOM byte-order-marker
      - id: fix-byte-order-marker
      # Secrets
      - id: detect-aws-credentials
      - id: detect-private-key
      # Python
      - id: check-ast
      - id: check-docstring-first
      - id: check-builtin-literals
      - id: requirements-txt-fixer
      # Filetypes
      # Leave this to yamllint
      # - id: check-yaml
      - id: check-json
      # - id: pretty-format-json
      - id: check-toml
      - id: check-xml
      # Files
      - id: check-illegal-windows-names
      - id: check-case-conflict
      - id: check-symlinks
      - id: destroyed-symlinks
      # Repo
      - id: check-added-large-files
      - id: forbid-submodules
      - id: forbid-new-submodules
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: [--branch, my_main]

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint

  # #Add this if we need to validate schemas
  # - repo: https://github.com/python-jsonschema/check-jsonschema
  #   rev: 0.33.2
  #   hooks:
  #     - id: check-jsonschema
  #       name: validate yaml
  #       files: ^terraform/.*/*.yaml$
  #       args: ["--schemafile", "schemas/schema.json"]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [docs, build, feat, fix, ci, chore, refactor, revert, style, test]

  # - repo: https://github.com/antonbabenko/pre-commit-terraform
  #   rev: v1.105.0
  #   hooks:
  #     - id: terraform_fmt
  #       args:
  #         - --args=-recursive
  #     - id: terraform_tflint
  #       args:
  #         - "--args=--config=__GIT_WORKING_DIR__/.tflint.hcl"

  - repo: https://github.com/aws-cloudformation/cfn-lint
    rev: v1.44.0
    hooks:
      - id: cfn-lint
        name: "cfn-lint: Lint Cloudformation templates"
        language: python
        language_version: "python3.13"
        additional_dependencies:
          - jschema-to-python
          - sarif-om
          - junit-xml
          - pydot
        args: [--format, pretty]
  #       files: infrastructure/.*\.(json|yml|yaml)$

  - repo: https://github.com/bridgecrewio/checkov.git
    rev: 3.2.505
    hooks:
      - id: checkov
        # verbose: true
        verbose: true
        always_run: true
        args: [--config-file, .checkov.yaml]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        additional_dependencies:
          - tomli
        args: [--config .codespellrc]

  # - repo: https://github.com/rhysd/actionlint
  #   # lint github actions
  #   rev: v1.7.11
  #   hooks:
  #     - id: actionlint

  # Inclusive language:
  # https://www.aswf.io/inclusive-language-guide/
  # https://developers.google.com/style/inclusive-documentation
  # https://github.com/dialpad/inclusive-language
  # Alternatives:
  # https://github.com/inclusivelint/inclusivelint
  #
  - repo: https://github.com/get-woke/woke
    # https://docs.getwoke.tech/tools/
    rev: 'v0.19.0'  # pick a tag to point to
    hooks:
      - id: woke
        args: [--exit-1-on-failure]

